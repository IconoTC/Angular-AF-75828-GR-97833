<div class="row">
  <div class="list-group col-md-3 col-lg-2 p-0 bg-body-secondary">
    @for (item of menu; track item) {
        <button
          class="list-group-item list-group-item-action"
          [class.active]="item.componente === cuerpo()"
          type="button"
          (click)="actual.set($index)"
        >
          <i class="{{ item.icono }}"></i> {{ item.texto }}
        </button>
    }
  </div>
  <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
    <ng-container *ngComponentOutlet="cuerpo()" />
  </main>
</div>
